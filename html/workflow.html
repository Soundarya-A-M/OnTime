<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnTime - How It Works</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(160deg, #0f2027 0%, #1a2a3a 30%, #1e3045 60%, #162638 100%);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container {
    width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .title {
    font-size: 42px;
    font-weight: 800;
    color: #ffffff;
    margin-bottom: 40px;
    text-align: left;
    width: 100%;
    letter-spacing: -1px;
  }

  .step-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .step-card {
    display: flex;
    align-items: center;
    gap: 18px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 22px 28px;
    width: 100%;
    backdrop-filter: blur(10px);
    transition: transform 0.2s;
  }

  .step-card:hover {
    transform: scale(1.02);
    border-color: rgba(255,255,255,0.2);
  }

  .icon-circle {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 28px;
  }

  .icon-1 { background: linear-gradient(135deg, #4ade80, #22c55e); }
  .icon-2 { background: linear-gradient(135deg, #60a5fa, #3b82f6); }
  .icon-3 { background: linear-gradient(135deg, #f472b6, #ec4899); }
  .icon-4 { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
  .icon-5 { background: linear-gradient(135deg, #a78bfa, #8b5cf6); }

  .step-text {
    font-size: 20px;
    font-weight: 600;
    color: #f1f5f9;
    letter-spacing: 0.2px;
  }

  .arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 40px;
    justify-content: center;
  }

  .arrow-line {
    width: 2px;
    height: 20px;
    background: rgba(255,255,255,0.25);
  }

  .arrow-head {
    width: 0;
    height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 8px solid rgba(255,255,255,0.25);
  }

  /* SVG Icons */
  .icon-circle svg {
    width: 30px;
    height: 30px;
    fill: #fff;
    stroke: #fff;
    stroke-width: 0;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="title">How It Works</div>

    <div class="step-wrapper">
      <!-- Step 1 -->
      <div class="step-card">
        <div class="icon-circle icon-1">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="16" y1="11" x2="22" y2="11"/>
          </svg>
        </div>
        <div class="step-text">User Registration</div>
      </div>

      <!-- Arrow -->
      <div class="arrow">
        <div class="arrow-line"></div>
        <div class="arrow-head"></div>
      </div>

      <!-- Step 2 -->
      <div class="step-card">
        <div class="icon-circle icon-2">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <path d="M8 11h6"/>
            <path d="M11 8v6"/>
          </svg>
        </div>
        <div class="step-text">Search Routes & Buses</div>
      </div>

      <!-- Arrow -->
      <div class="arrow">
        <div class="arrow-line"></div>
        <div class="arrow-head"></div>
      </div>

      <!-- Step 3 -->
      <div class="step-card">
        <div class="icon-circle icon-3">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </div>
        <div class="step-text">Real-Time GPS Tracking</div>
      </div>

      <!-- Arrow -->
      <div class="arrow">
        <div class="arrow-line"></div>
        <div class="arrow-head"></div>
      </div>

      <!-- Step 4 -->
      <div class="step-card">
        <div class="icon-circle icon-4">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M2 10h20"/>
            <path d="M12 4v16"/>
            <circle cx="7" cy="14" r="1.5" fill="white"/>
            <circle cx="17" cy="14" r="1.5" fill="white"/>
          </svg>
        </div>
        <div class="step-text">Book Seats & Get Tickets</div>
      </div>

      <!-- Arrow -->
      <div class="arrow">
        <div class="arrow-line"></div>
        <div class="arrow-head"></div>
      </div>

      <!-- Step 5 -->
      <div class="step-card">
        <div class="icon-circle icon-5">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div class="step-text">Live ETA Updates</div>
      </div>

    </div>
  </div>
</body>
</html>
