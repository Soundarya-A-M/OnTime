<!DOCTYPE html>
<html>
    <head>
        <title>Live Bus Map</title>
        <style>
            body{
                font-family: Arial;
                text-align: center;
            }
            .map{
                width:80%;
                height:300px;
                margin: auto;
                background-color: #f0f0f0;
                position:relatives;
                border:2px soild #000;

            }
            .route{
                position:absolute;
                top:120px;
                left:20px;
                width:90%;
                height:5px;
                background-color: #000;
            }
            .stop{
                position:absolute;
                top:95px;
                left:60px;
                width:50px;
                height:30px;
                background-color: red;
                color:white;
                line-height:30px;
                font-size:12px;
            }
            .bus{
                position:absolute;
                top:85px;
                left:20;
                width:50px;
                height:30px;
                background-color: blue;
                color:white;
                line-height: 30px;
                font-size: 12px;
                animation:movebus 4s linear infinite;
            }
            @keyframes movebus{
                from{left:20px;}
                to{left:80%;}
            }
            </style>
            </head>
            <body>
                <h2>Live Bus Map</h2>
                <div class="map">
                    <div class="route"></div>
                    <div class="stop"></div>
                    <div class="bus"></div>
                </div>
        </body>
        </html>
