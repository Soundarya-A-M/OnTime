<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KSRTC – Live Bus Tracking</title>  <!-- Leaflet Map CDN -->  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }

    /* HEADER */
    header {
      background: #0b4da2;
      color: white;
      padding: 10px;
      text-align: center;
    }

    header img {
      height: 40px;
      vertical-align: middle;
    }

    /* HERO IMAGE */
    .hero {
      background: url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957') center/cover;
      height: 160px;
      border-radius: 0 0 20px 20px;
    }

    /* CARD */
    .card {
      background: #fff;
      margin: -40px 15px 15px;
      padding: 15px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .tabs button {
      padding: 8px 15px;
      border: none;
      border-radius: 20px;
      margin-right: 5px;
      background: #eee;
      cursor: pointer;
    }

    .tabs .active {
      background: #ff7a00;
      color: white;
    }

    .field {
      margin-top: 12px;
    }

    .field input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
    }

    .date-boxes {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
    }

    .date {
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 12px;
      text-align: center;
      width: 18%;
      font-size: 12px;
    }

    .date.active {
      background: #ff7a00;
      color: white;
    }

    .btn {
      background: #ff7a00;
      color: white;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      margin-top: 20px;
      font-size: 16px;
      cursor: pointer;
    }

    /* LIVE TRACKING */
    .tracking {
      margin: 15px;
      background: #fff;
      border-radius: 20px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    #map {
      height: 220px;
      border-radius: 15px;
    }

    .track-btn {
      margin-top: 10px;
      background: #0b4da2;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 14px;
      cursor: pointer;
    }

    footer {
      background: #0b4da2;
      color: white;
      text-align: center;
      padding: 8px;
      font-size: 12px;
    }
  </style></head>
<body><header>
  <img src="https://upload.wikimedia.org/wikipedia/commons/2/2e/KSRTC_Logo.png" />
  <div>Karnataka State Road Transport Corporation</div>
</header><div class="hero"></div><div class="card">
  <div class="tabs">
    <button class="active">Onward</button>
    <button>Round Trip</button>
    <label><input type="checkbox" /> Single Lady</label>
  </div>  <div class="field">
    <input type="text" placeholder="Leaving From" />
  </div>  <div class="field">
    <input type="text" placeholder="Going To" />
  </div>  <div class="date-boxes">
    <div class="date active">23<br/>TODAY</div>
    <div class="date">24<br/>SAT</div>
    <div class="date">25<br/>SUN</div>
    <div class="date">26<br/>MON</div>
    <div class="date">27<br/>TUE</div>
  </div><button class="btn">CHECK AVAILABILITY</button>

</div><!-- LIVE TRACKING SECTION --><div class="tracking">
  <h3>🚌 Live Bus Tracking</h3>
  <div id="map"></div>
  <button class="track-btn" onclick="moveBus()">Start Live Tracking</button>
</div><footer>
  © 2024 KSRTC | Demo Project
</footer><script>
  // Map Initialization
  var map = L.map('map').setView([12.9716, 77.5946], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // Bus Marker
  var busIcon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/61/61231.png',
    iconSize: [40, 40]
  });

  var busMarker = L.marker([12.9716, 77.5946], { icon: busIcon }).addTo(map);

  // Dummy Live Movement
  function moveBus() {
    let lat = 12.9716;
    let lng = 77.5946;

    setInterval(() => {
      lat += 0.001;
      lng += 0.001;
      busMarker.setLatLng([lat, lng]);
      map.panTo([lat, lng]);
    }, 2000);
  }
</script></body>
</html>
